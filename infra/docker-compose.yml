services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dashr
      POSTGRES_PASSWORD: dashr
      POSTGRES_DB: dashr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  celery-worker:
    build:
      context: ../apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://dashr:dashr@postgres:5432/dashr
      JWT_SECRET: local-dev-only-not-for-production
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      - postgres
      - redis
      - minio

volumes:
  postgres_data:
  minio_data:
